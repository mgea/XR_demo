<html>
<head>
  <meta charset="utf-8">
  <title>AR CRIAV26</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <!-- Look-at -->
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

  <!-- Extras -->
  <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

   


</head>

<body style="margin:0; overflow:hidden;">

<a-scene
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
  arjs="sourceType: webcam; debugUIEnabled: false;">

  

  <!-- CÁMARA -->
  <a-camera gps-new-camera="gpsMinDistance: 5" rotation-reader>
  </a-camera>

  <!-- SONIDO GLOBAL -->
  <a-entity sound="src: url(https://cdn.pixabay.com/download/audio/2025/05/06/audio_2fd68b9a9a.mp3); autoplay: false"></a-entity>

  <!-- 🔴 PUNTO 1 -->
  <!---- *******************************************  -->
  <!------  C/ Guadalajara PRUEBAS  -------------------->

 
  <a-entity gps-new-entity-place="latitude: 37.176590346; longitude: -3.603191"
            look-at="[gps-new-camera]"
            distance="min: 0; max: 300"
            show-info>

    <a-text value="Hola mundo"
            color="red"
            align="center"
            scale="1.5 1.5 1.5"
            position="0 3 0"></a-text>

    <a-box color="green"
           depth="2"
           height="0.5"
           width="2"
           position="0 0 0">
          </a-box>

  </a-entity>

  <!-- 🔵 FCD1 -->
  <a-entity gps-new-entity-place="latitude: 37.193209 ; longitude: -3.596815"
            look-at="[gps-new-camera]">

    <a-text value="FCD1 entrada"
            color="red"
            align="center"
            scale="1.5 1.5 1.5"
            position="0 3 0"></a-text>

    <a-box color="blue"
           depth="1"
           height="0.5"
           width="1.5"
           play-on-click></a-box>

  </a-entity>

  <!-- 🔴 FCD2 -->
  <a-entity gps-new-entity-place="latitude: 37.193713 ; longitude: -3.596499"
            look-at="[gps-new-camera]">

    <a-text value="FCD2 clase"
            color="red"
            align="center"
            scale="1.5 1.5 1.5"
            position="0 3 0"></a-text>

    <a-box color="red"
           depth="1"
           height="0.5"
           width="1.5"
           play-on-click></a-box>

  </a-entity>

  <!-- ⚪ FCD3 -->
  <a-entity gps-new-entity-place="latitude: 37.1938563 ; longitude: -3.595924973"
            look-at="[gps-new-camera]">

    <a-text value="FCD3 patio/despacho"
            color="red"
            align="center"
            scale="1.5 1.5 1.5"
            position="0 3 0"></a-text>

    <a-box color="white"
           depth="1"
           height="0.5"
           width="1.5"></a-box>

  </a-entity>

  <!-- 🟣 BUS -->
  <a-entity gps-new-entity-place="latitude: 37.190203 ; longitude: -3.598752"
            look-at="[gps-new-camera]">

    <a-text value="AR Cartuja Bus"
            color="red"
            align="center"
            scale="2 2 2"
            position="0 3 0"></a-text>

    <a-box color="pink"
           depth="1"
           height="0.5"
           width="1.5"></a-box>

  </a-entity>


   <!------  CENTRO   --------------------->

  <!------  1 Plaza Bibrambla  --------------------->

   <a-entity
      gps-new-entity-place="latitude: 37.175169; longitude: -3.599811"
      look-at="[gps-new-camera]">

      <!-- TEXTO (arriba) -->
      <a-text
        value="Plaza Bibrambla"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        color="red"
        align="center"
        scale="2 2 2"
        position="0 3 0">
      </a-text>
    </a-entity>

  <!------  2 Plaza Catedral   --------------------->
  <a-entity
      gps-new-entity-place="latitude: 37.176129; longitude: -3.59971"
      look-at="[gps-new-camera]">

      <!-- TEXTO (arriba) -->
      <a-text
        value="Catedral"
        color="blue"
        align="center"
        scale="2 2 2"
        position="0 3 0">
      </a-text>
      <!-- BOX (abajo / base) -->
      <a-box
        color="white"
        depth="1"
        height="0.5"
        width="1.5"
        position="0 0 0"
        animation="property: rotation; to: 0 360 0; dur: 4000; loop: true">
      </a-box>

    </a-entity>
    

<!------  3 Plaza Ayuntamiento    ----------------->

<a-entity

      <a-box

    </a-entity>
    

 <!------  5 ETSII Informatica       ---------------->

      <a-entity

      <!-- TEXTO (arriba) -->
      <a-text

            <!-- BOX (abajo / base) --> 
      <a-box

<!------  10 BIblAndalucia     ---------------------->

<a-entity
     gps-new-entity-place="latitude: 37.1784688; longitude: -3.60605567"
      look-at="[gps-new-camera]">

    
    <a-entity
        gltf-model="url(https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/RobotExpressive/glTF-Binary/RobotExpressive.glb)"
        scale="0.5 0.5 0.5"

    </a-entity>
    




</a-scene>

</body>
</html>
