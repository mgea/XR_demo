<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LocAR Test</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <!-- Importamos LocAR como módulo -->
    <script type="module">
        import * as LOCAR from 'https://cdn.jsdelivr.net/npm/locar/dist/locar.esm.js';

        AFRAME.registerComponent('locar-system', {
            init: function () {
                const cameraEl = document.querySelector("a-camera");
                
                // Nos aseguramos de que la cámara interna de Three.js esté lista
                if (!cameraEl.getObject3D('camera')) {
                    cameraEl.addEventListener('camera-set', () => this.initLocAR());
                } else {
                    this.initLocAR();
                }
            },

            initLocAR: function () {
                const sceneEl = this.el;
                const cameraEl = document.querySelector("a-camera");
                const cameraThree = cameraEl.getObject3D('camera');

                // 1. Inicializar cámara web (¡Ojo! LocAR suele requerir pasarle el elemento canvas de la escena)
                this.webcam = new LOCAR.WebcamRenderer(sceneEl.renderer, sceneEl.canvas);

                // 2. Inicializar GPS
                this.location = new LOCAR.LocationBased(cameraThree, sceneEl.object3D);

                // 3. Inicializar controles de orientación (brújula)
                this.controls = new LOCAR.DeviceOrientationControls(cameraEl.object3D);

                // 4. Obtener la caja y añadirla al GPS (Coordenadas en Granada)
                const box = document.querySelector("#box");
                this.location.add(box.object3D, 37.176590346, -3.603191);

                // Iniciar el tracking GPS y escuchar actualizaciones
                this.location.startGPS();

                // [Opcional pero recomendado]: Ver por consola si el GPS obtiene tu posición
                window.addEventListener('gps-camera-update-position', (e) => {
                    console.log(`Tu posición actual: Lat ${e.detail.position.latitude}, Lon ${e.detail.position.longitude}`);
                });
            },

            // Bucle nativo de renderizado de A-Frame
            tick: function (time, timeDelta) {
                if (this.controls && this.webcam) {
                    this.controls.update();
                    
                    // IMPORTANTE: Para evitar parpadeos, desactivamos el autoClear del renderer 
                    // temporalmente mientras LocAR dibuja el fondo de la webcam
                    const autoClear = this.el.renderer.autoClear;
                    this.el.renderer.autoClear = false;
                    
                    this.webcam.render();
                    
                    this.el.renderer.autoClear = autoClear;
                }
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <!-- Añadimos nuestro componente a la escena -->
    <a-scene locar-system embedded vr-mode-ui="enabled: false">
        
        <a-camera position="0 1.6 0" look-controls="enabled: false"></a-camera>

        <a-box
            id="box"
            color="red"
            scale="5 5 5">
        </a-box>

    </a-scene>

</body>
</html>
