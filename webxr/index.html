<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WebXR AR GPS Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <!-- A-Frame (Versión recomendada para máxima estabilidad con AR.js GPS) -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

    <!-- AR.js específico para A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
        // Componente interactivo y de depuración
        AFRAME.registerComponent('interactivo', {
            init: function () {
                const el = this.el;

                el.addEventListener('click', function () {
                    const colores = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3'];
                    const colorAleatorio = colores[Math.floor(Math.random() * colores.length)];
                    el.setAttribute('material', 'color', colorAleatorio);
                    el.emit('pulsar');
                });

                // Escuchamos cuando AR.js calcula la distancia al objeto
                el.addEventListener('gps-entity-place-update-positon', (event) => {
                    console.log(`El cubo está a ${event.detail.distance} metros de ti.`);
                });
            }
        });
    </script>
</head>

<body style="margin: 0; overflow: hidden;">

    <!-- 
      Configuración limpia de AR.js:
      - trackingMethod: geolocation (fuerza el uso de GPS)
    -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; trackingMethod: geolocation; debugUIEnabled: false;"
        raycaster="objects: .clickable">
        
        <!-- 
          CÁMARA GPS: 
          - alert="true" te avisará en la pantalla del móvil si no tiene señal GPS.
        -->
        <a-camera gps-camera="alert: true;" rotation-reader>
            <a-cursor raycaster="objects: .clickable" fuse="false" material="color: yellow; shader: flat" scale="2 2 2"></a-camera>
        </a-camera>

        <!-- 
          OBJETO RE-POSICIONADO:
          Modifiqué levemente la longitud (-3.603191 -> -3.603350) 
          Esto hace que el cubo aparezca desplazado unos metros en el mapa de Granada para que no aparezca "encima" de tu cabeza.
        -->
        <a-box
            id="box"
            class="clickable"
            interactivo
            color="red"
            scale="3 3 3"
            gps-entity-place="latitude: 37.176590; longitude: -3.603350;"
            animation="property: scale; to: 4 4 4; dir: alternate; dur: 150; startEvents: pulsar; loop: 1">
        </a-box>

    </a-scene>

</body>
</html>
