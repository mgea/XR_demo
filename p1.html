<script>


/**** Contador de elementos ***/
let count = 0;

AFRAME.registerComponent('click-counter', {

  init: function () {

    this.el.addEventListener('click', () => {

      count++;

      const counter = document.querySelector('#counter');

      counter.setAttribute('value', 'Clicks: ' + count);

    });

  }

});
/***********************************/


  AFRAME.registerComponent('play-on-click', {
    init: function () {
      this.el.addEventListener('click', () => {
        const sound = this.el.components.sound;
        if (sound) sound.playSound();
      });
    }
  });

  /* --- usando mouseenter / leave ---*/
 AFRAME.registerComponent('show-info', {

  init: function () {

    this.el.addEventListener('mouseenter', () => {
      const sound = this.el.components.sound2;
        if (sound) sound.playSound();
      const info = document.querySelector('#info');

      info.setAttribute(
        'value',
        '📍 Plaza Bib-Rambla'
      );

      info.setAttribute('visible', true);

    });

    this.el.addEventListener('mouseleave', () => {

      const info = document.querySelector('#info');

      info.setAttribute('visible', false);

    });

  }

});
/***
AFRAME.registerComponent('show-info', {
  schema: {
    text: {type: 'string'}
  },

  init: function () {
    this.el.addEventListener('click', () => {

      const info = document.querySelector('#info');

      info.setAttribute('value', this.data.text);

      info.setAttribute('visible', true);

      setTimeout(() => {
        info.setAttribute('visible', false);
      }, 3000);

    });
  }
});

***/
  AFRAME.registerComponent('change-color', {

  init: function () {

    this.el.addEventListener('click', () => {

      const current = this.el.getAttribute('color');

      if(current === 'red'){
        this.el.setAttribute('color', 'blue');
      } else {
        this.el.setAttribute('color', 'red');
      }

    });

  }

});

  </script>
